services:
  postgres:
    image: postgres:16
    container_name: fire-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fire
    ports:
      - "5432:5432"
    volumes:
      - fire_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fire"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fire-migrate
    working_dir: /app
    command: ["alembic", "-c", "backend/alembic.ini", "upgrade", "head"]
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/fire
      AUTO_CREATE_SCHEMA: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fire-api
    working_dir: /app
    command: ["python", "-m", "uvicorn", "backend.app:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/fire
      AUTO_CREATE_SCHEMA: "false"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fire-worker
    working_dir: /app
    command: ["python", "-m", "backend.worker"]
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/fire
      AUTO_CREATE_SCHEMA: "false"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  fire_pg_data:
